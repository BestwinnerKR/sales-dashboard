<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메가인포 영업 포털 — 로그인</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">베스트위너 영업 포털</div>
      <div class="sub">Bestwinner Sales Portal</div>
    </div>
    <h2>로그인</h2>
    <div class="form-group">
      <label>사번</label>
      <input type="text" id="staff-code" placeholder="사번을 입력하세요" autocomplete="off">
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="name" placeholder="이름을 입력하세요" autocomplete="off">
    </div>
    <button class="btn-primary" id="login-btn" onclick="login()">로그인</button>
    <div class="error-msg" id="error-msg">사번 또는 이름이 올바르지 않습니다.</div>
  </div>
</div>

<script>
const EDGE_URL = 'https://cacapnccxogkwatpvvte.supabase.co/functions/v1/notion-proxy';

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});

async function login() {
  const staffCode = document.getElementById('staff-code').value.trim();
  const name = document.getElementById('name').value.trim();
  const btn = document.getElementById('login-btn');
  const errMsg = document.getElementById('error-msg');

  if (!staffCode || !name) {
    errMsg.textContent = '사번과 이름을 모두 입력해주세요.';
    errMsg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '확인 중...';
  errMsg.style.display = 'none';

  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', staff_code: staffCode, name })
    });
    const data = await res.json();

    if (data.success) {
      sessionStorage.setItem('staff', JSON.stringify(data.staff));
      location.href = 'dashboard.html';
    } else {
      errMsg.textContent = '사번 또는 이름이 올바르지 않습니다.';
      errMsg.style.display = 'block';
    }
  } catch (e) {
    errMsg.textContent = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
    errMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}
</script>
</body>
</html>
